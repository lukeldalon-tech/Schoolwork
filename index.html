<!DOCTYPE html>
<html>
<head>
<title>Sky Platform Shooter</title>

<style>
body{
margin:0;
background:skyblue;
overflow:hidden;
font-family:Arial;
}

canvas{
display:block;
margin:auto;
background:#87CEEB;
}

/* touch controls */
.controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

button{
width:70px;
height:70px;
font-size:22px;
border-radius:12px;
border:none;
background:#222;
color:white;
}

button:active{
background:#555;
}
</style>
</head>

<body>

<canvas id="game" width="800" height="500"></canvas>

<div class="controls">
<button id="left">◀</button>
<button id="right">▶</button>
<button id="jump">▲</button>
<button id="shoot">●</button>
</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let level = 1

let player = {x:100,y:350,w:20,h:40,vy:0}
let enemy = {x:650,y:200,w:20,h:40,vy:0,health:1}

let bullets=[]

let controls={
left:false,
right:false,
jump:false
}

/* TOUCH BUTTONS */

function hold(id,key){
let b=document.getElementById(id)

b.ontouchstart=()=>controls[key]=true
b.ontouchend=()=>controls[key]=false
b.onmousedown=()=>controls[key]=true
b.onmouseup=()=>controls[key]=false
}

hold("left","left")
hold("right","right")
hold("jump","jump")

document.getElementById("shoot").onclick=()=>{
shoot(player.x+10,player.y+15,1,"blue")
}

/* SHOOTING */

function shoot(x,y,dir,color){
bullets.push({x:x,y:y,vx:dir*7,color:color})
}

/* PLATFORMS */

let blocks=[
{x:0,y:420,w:800,h:20},
{x:200,y:320,w:120,h:20,dx:1},
{x:500,y:220,w:120,h:20,dx:-1}
]

/* PHYSICS */

function physics(p){

p.vy+=0.5
p.y+=p.vy

for(let b of blocks){

if(p.x+p.w>b.x && p.x<b.x+b.w &&
p.y+p.h>b.y && p.y+p.h<b.y+10){

p.y=b.y-p.h
p.vy=0

}

}

}

/* ENEMY AI */

function enemyAI(){

let speed = 1 + level*0.2

if(enemy.x > player.x) enemy.x -= speed
if(enemy.x < player.x) enemy.x += speed

if(Math.random()<0.02) enemy.vy = -9

if(Math.random()<0.02 + level*0.005){
shoot(enemy.x,enemy.y+15,-1,"red")
}

}

/* MOVING PLATFORMS */

function movePlatforms(){

for(let b of blocks){

if(b.dx){

b.x += b.dx

if(b.x<100 || b.x>600){
b.dx*=-1
}

}

}

}

/* LEVEL SYSTEM */

function nextLevel(){

level++

player.x=100
player.y=350
bullets=[]

if(level==10){

enemy = {x:650,y:200,w:40,h:80,vy:0,health:8}

}else{

enemy = {x:650,y:200,w:20,h:40,vy:0,health:1}

blocks.push({
x:150+Math.random()*400,
y:180,
w:120,
h:20,
dx:1
})

}

}

/* UPDATE */

function update(){

if(controls.left) player.x-=3
if(controls.right) player.x+=3
if(controls.jump && player.vy===0) player.vy=-10

physics(player)
physics(enemy)

enemyAI()
movePlatforms()

for(let b of bullets){

b.x+=b.vx

/* player hit */

if(b.color==="red"){

if(b.x>player.x && b.x<player.x+player.w &&
b.y>player.y && b.y<player.y+player.h){

alert("Enemy Wins")
location.reload()

}

}

/* enemy hit */

if(b.color==="blue"){

if(b.x>enemy.x && b.x<enemy.x+enemy.w &&
b.y>enemy.y && b.y<enemy.y+enemy.h){

enemy.health--

if(enemy.health<=0){

if(level>=10){

alert("YOU BEAT THE BOSS!")
location.reload()

}else{

nextLevel()

}

}

}

}

}

bullets = bullets.filter(b=>b.x>0 && b.x<800)

}

/* DRAW CHARACTER */

function drawPerson(x,y,color,size=1){

ctx.strokeStyle=color
ctx.lineWidth=3

/* head */
ctx.beginPath()
ctx.arc(x+10*size,y+8*size,6*size,0,Math.PI*2)
ctx.stroke()

/* body */
ctx.beginPath()
ctx.moveTo(x+10*size,y+14*size)
ctx.lineTo(x+10*size,y+28*size)
ctx.stroke()

/* arms */
ctx.beginPath()
ctx.moveTo(x,y+20*size)
ctx.lineTo(x+20*size,y+20*size)
ctx.stroke()

/* legs */
ctx.beginPath()
ctx.moveTo(x+10*size,y+28*size)
ctx.lineTo(x,y+40*size)
ctx.moveTo(x+10*size,y+28*size)
ctx.lineTo(x+20*size,y+40*size)
ctx.stroke()

}

/* DRAW */

function draw(){

ctx.clearRect(0,0,800,500)

/* platforms */

for(let b of blocks){
ctx.fillStyle="#7a5230"
ctx.fillRect(b.x,b.y,b.w,b.h)
}

/* player */

drawPerson(player.x,player.y,"blue")

/* enemy */

if(level==10){

drawPerson(enemy.x,enemy.y,"darkred",2)

}else{

drawPerson(enemy.x,enemy.y,"red")

}

/* bullets */

for(let b of bullets){
ctx.fillStyle=b.color
ctx.fillRect(b.x,b.y,6,3)
}

/* level text */

ctx.fillStyle="black"
ctx.font="20px Arial"
ctx.fillText("Level: "+level,20,30)

if(level==10){
ctx.fillText("BOSS HP: "+enemy.health,650,30)
}

}

/* LOOP */

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

loop()

</script>
</body>
</html>
