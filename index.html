<!DOCTYPE html>
<html>
<head>
<title>Sky Platform Shooter</title>

<style>

body{
margin:0;
overflow:hidden;
background:skyblue;
font-family:Arial;
}

canvas{
display:block;
margin:auto;
background:#87CEEB;
}

/* CONTROLS */

.leftControls{
position:fixed;
bottom:20px;
left:20px;
display:flex;
gap:15px;
}

.rightControls{
position:fixed;
bottom:20px;
right:20px;
display:flex;
gap:15px;
}

button{
width:95px;
height:95px;
font-size:32px;
border-radius:18px;
border:none;
background:#222;
color:white;
touch-action:none;
}

button:active{
background:#555;
}

</style>
</head>

<body>

<canvas id="game" width="900" height="500"></canvas>

<div class="leftControls">
<button id="left">⬅</button>
<button id="right">➡</button>
</div>

<div class="rightControls">
<button id="jump">▲</button>
<button id="shoot">🔫</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const worldWidth=4000

let cameraX=0
let level=1

let playing=false
let countdown=5

/* PLAYER */

let player={
x:200,
y:350,
w:20,
h:40,
vy:0,
health:5,
maxHealth:5
}

/* ENEMY */

let enemy={
x:1200,
y:200,
w:20,
h:40,
vy:0,
health:1
}

/* ARRAYS */

let bullets=[]
let particles=[]

/* CONTROLS */

let controls={left:false,right:false,jump:false}

function hold(id,key){

let b=document.getElementById(id)

b.onpointerdown=()=>controls[key]=true
b.onpointerup=()=>controls[key]=false
b.onpointerleave=()=>controls[key]=false

}

hold("left","left")
hold("right","right")
hold("jump","jump")

document.getElementById("shoot").onpointerdown=()=>{
if(playing){
shoot(player.x+10,player.y+20,1,"blue")
}
}

/* SHOOT */

function shoot(x,y,dir,color){

bullets.push({
x:x,
y:y,
vx:dir*9,
color:color
})

}

/* EXPLOSION */

function explosion(x,y){

for(let i=0;i<20;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8,
life:35
})

}

}

/* WORLD PLATFORMS */

let blocks=[
{x:0,y:420,w:4000,h:20},

{x:400,y:320,w:150,h:20},
{x:700,y:260,w:150,h:20},
{x:1000,y:200,w:150,h:20},
{x:1400,y:280,w:150,h:20},

{x:1800,y:240,w:150,h:20},
{x:2100,y:300,w:150,h:20},

{x:2500,y:260,w:150,h:20},
{x:2800,y:200,w:150,h:20},

{x:3200,y:260,w:150,h:20}
]

/* MOVING PLATFORMS */

let movingPlatforms=[
{x:1600,y:180,w:120,h:20,dir:1},
{x:3000,y:150,w:120,h:20,dir:-1}
]

/* PHYSICS */

function physics(p){

p.vy+=0.5
p.y+=p.vy

for(let b of blocks){

if(p.x+p.w>b.x &&
p.x<b.x+b.w &&
p.y+p.h>b.y &&
p.y+p.h<b.y+10){

p.y=b.y-p.h
p.vy=0

}

}

for(let m of movingPlatforms){

if(p.x+p.w>m.x &&
p.x<m.x+m.w &&
p.y+p.h>m.y &&
p.y+p.h<m.y+10){

p.y=m.y-p.h
p.vy=0

}

}

if(p.y>450){
p.y=350
p.vy=0
}

}

/* ENEMY AI */

function enemyAI(){

let speed=1.5 + level*0.25

if(enemy.x>player.x) enemy.x-=speed
if(enemy.x<player.x) enemy.x+=speed

if(Math.random()<0.02) enemy.vy=-10

if(Math.random()<0.02 + level*0.005){
shoot(enemy.x,enemy.y+20,-1,"red")
}

}

/* LEVEL SYSTEM */

function nextLevel(){

level++

player.x=200
player.y=350
player.health=player.maxHealth

bullets=[]

if(level==10){

enemy={
x:3000,
y:200,
w:40,
h:80,
vy:0,
health:12
}

}else{

enemy={
x:1500+Math.random()*1500,
y:200,
w:20,
h:40,
vy:0,
health:1
}

}

startCountdown()

}

/* COUNTDOWN */

function startCountdown(){

countdown=5
playing=false

let timer=setInterval(()=>{

countdown--

if(countdown<=0){
playing=true
clearInterval(timer)
}

},1000)

}

startCountdown()

/* UPDATE */

function update(){

if(!playing) return

if(controls.left) player.x-=4
if(controls.right) player.x+=4
if(controls.jump && player.vy===0) player.vy=-11

physics(player)
physics(enemy)

enemyAI()

/* MOVE PLATFORMS */

for(let m of movingPlatforms){

m.x += m.dir*1.5

if(m.x<1400 || m.x>1800) m.dir*=-1

}

/* CAMERA */

cameraX=player.x-450

if(cameraX<0) cameraX=0
if(cameraX>worldWidth-900) cameraX=worldWidth-900

/* BULLETS */

for(let b of bullets){

b.x+=b.vx

/* PLAYER HIT */

if(b.color==="red"){

if(b.x>player.x &&
b.x<player.x+player.w &&
b.y>player.y &&
b.y<player.y+player.h){

player.health--

explosion(player.x,player.y)

if(player.health<=0){

alert("Enemy Wins!")
location.reload()

}

}

}

/* ENEMY HIT */

if(b.color==="blue"){

if(b.x>enemy.x &&
b.x<enemy.x+enemy.w &&
b.y>enemy.y &&
b.y<enemy.y+enemy.h){

enemy.health--

explosion(b.x,b.y)

if(enemy.health<=0){

if(level>=10){

alert("YOU BEAT THE BOSS!")
location.reload()

}else{

nextLevel()

}

}

}

}

}

bullets=bullets.filter(b=>b.x>0 && b.x<worldWidth)

/* PARTICLES */

for(let p of particles){

p.x+=p.vx
p.y+=p.vy
p.life--

}

particles=particles.filter(p=>p.life>0)

}

/* DRAW CHARACTER */

function drawPerson(x,y,color,size=1){

ctx.strokeStyle=color
ctx.lineWidth=3

ctx.beginPath()
ctx.arc(x+10*size,y+8*size,6*size,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x+10*size,y+14*size)
ctx.lineTo(x+10*size,y+28*size)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x,y+20*size)
ctx.lineTo(x+20*size,y+20*size)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x+10*size,y+28*size)
ctx.lineTo(x,y+40*size)
ctx.moveTo(x+10*size,y+28*size)
ctx.lineTo(x+20*size,y+40*size)
ctx.stroke()

}

/* DRAW */

function draw(){

ctx.clearRect(0,0,900,500)

/* BLOCKS */

for(let b of blocks){

ctx.fillStyle="#7a5230"
ctx.fillRect(b.x-cameraX,b.y,b.w,b.h)

}

/* MOVING */

for(let m of movingPlatforms){

ctx.fillStyle="#9c6b3c"
ctx.fillRect(m.x-cameraX,m.y,m.w,m.h)

}

/* PLAYER */

drawPerson(player.x-cameraX,player.y,"blue")

/* ENEMY */

if(level==10){
drawPerson(enemy.x-cameraX,enemy.y,"darkred",2)
}else{
drawPerson(enemy.x-cameraX,enemy.y,"red")
}

/* BULLETS */

for(let b of bullets){
ctx.fillStyle=b.color
ctx.fillRect(b.x-cameraX,b.y,6,3)
}

/* PARTICLES */

for(let p of particles){
ctx.fillStyle="orange"
ctx.fillRect(p.x-cameraX,p.y,4,4)
}

/* UI */

ctx.fillStyle="black"
ctx.font="32px Arial"
ctx.fillText("LEVEL "+level,20,40)

/* HEALTH BAR */

let hp=player.health/player.maxHealth

ctx.fillStyle="black"
ctx.fillRect(20,60,200,20)

ctx.fillStyle=hp>0.4?"green":"red"
ctx.fillRect(20,60,200*hp,20)

ctx.strokeStyle="white"
ctx.strokeRect(20,60,200,20)

ctx.fillStyle="black"
ctx.font="18px Arial"
ctx.fillText("Health",20,55)

/* BOSS HP */

if(level==10){

ctx.font="26px Arial"
ctx.fillText("Boss HP: "+enemy.health,650,40)

}

/* COUNTDOWN */

if(!playing){

ctx.font="70px Arial"
ctx.fillText(countdown,430,250)

}

}

/* LOOP */

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
