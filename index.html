<!DOCTYPE html>
<html>
<head>
<title>Sky Battle</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#87CEEB;
}

canvas{
display:block;
margin:auto;
}

/* TOUCH CONTROLS /

.leftControls{
position:fixed;
bottom:20px;
left:20px;
display:flex;
gap:15px;
}

.rightControls{
position:fixed;
bottom:20px;
right:20px;
display:flex;
gap:15px;
}

button{
width:95px;
height:95px;
font-size:32px;
border-radius:18px;
border:none;
background:#222;
color:white;
touch-action:none;
}

button:active{
background:#555;
}

</style>
</head>

<body>

<canvas id="game" width="900" height="500"></canvas>

<div class="leftControls">
<button id="left">⬅</button>
<button id="right">➡</button>
</div>

<div class="rightControls">
<button id="jump">▲</button>
<button id="shoot">🔫</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let state="menu"

let level=1
let cameraX=0
const worldWidth=4000

/ PLAYER /

let player={
x:200,
y:350,
w:20,
h:40,
vy:0,
health:5,
maxHealth:5,
dir:1
}

/ ENEMY /

let enemy={
x:1200,
y:200,
w:20,
h:40,
vy:0,
health:2
}

let bullets=[]
let particles=[]

/ CONTROLS /

let controls={left:false,right:false,jump:false}

function hold(id,key){

let b=document.getElementById(id)

b.onpointerdown=()=>controls[key]=true
b.onpointerup=()=>controls[key]=false
b.onpointerleave=()=>controls[key]=false

}

hold("left","left")
hold("right","right")
hold("jump","jump")

document.getElementById("shoot").onpointerdown=()=>{

if(state==="playing"){
shootPlayer()
}

}

/ PLAYER SHOOT /

function shootPlayer(){

let dir = enemy.x > player.x ? 1 : -1

bullets.push({
x:player.x+10,
y:player.y+18,
vx:dir9,
color:"blue"
})

}

/* ENEMY SHOOT /

function shootEnemy(){

let dir = player.x > enemy.x ? 1 : -1

bullets.push({
x:enemy.x+10,
y:enemy.y+18,
vx:dir7,
color:"red"
})

}

/* EXPLOSION */

function explosion(x,y){

for(let i=0;i<20;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)8,
vy:(Math.random()-0.5)8,
life:40
})

}

}

/ CLOUDS /

let clouds=[]

for(let i=0;i<12;i++){

clouds.push({
x:Math.random()4000,
y:50+Math.random()150,
size:40+Math.random()40
})

}

/ PLATFORMS /

let blocks=[
{x:0,y:420,w:4000,h:20},
{x:400,y:320,w:150,h:20},
{x:700,y:260,w:150,h:20},
{x:1000,y:200,w:150,h:20},
{x:1400,y:280,w:150,h:20},
{x:1800,y:240,w:150,h:20},
{x:2200,y:300,w:150,h:20},
{x:2600,y:240,w:150,h:20},
{x:3000,y:200,w:150,h:20}
]

/ PHYSICS /

function physics(p){

p.vy+=0.5
p.y+=p.vy

for(let b of blocks){

if(p.x+p.w>b.x &&
p.x<b.x+b.w &&
p.y+p.h>b.y &&
p.y+p.h<b.y+10){

p.y=b.y-p.h
p.vy=0

}

}

if(p.y>450){

p.y=350
p.vy=0

}

}

/ SMART AI /

function enemyAI(){

let distance=Math.abs(player.x-enemy.x)

if(distance>120){

if(player.x>enemy.x) enemy.x+=1.5+level0.2
else enemy.x-=1.5+level0.2

}

if(Math.random()<0.02) enemy.vy=-10

if(distance<500 && Math.random()<0.02){
shootEnemy()
}

}

/ UPDATE /

function update(){

if(state!=="playing") return

/ PLAYER MOVE /

if(controls.left){
player.x-=4
player.dir=-1
}

if(controls.right){
player.x+=4
player.dir=1
}

if(controls.jump && player.vy===0){
player.vy=-11
}

physics(player)
physics(enemy)

enemyAI()

cameraX=player.x-450

if(cameraX<0) cameraX=0
if(cameraX>worldWidth-900) cameraX=worldWidth-900

/ BULLETS /

for(let b of bullets){

b.x+=b.vx

/ HIT PLAYER /

if(b.color==="red"){

if(b.x>player.x && b.x<player.x+player.w &&
b.y>player.y && b.y<player.y+player.h){

player.health--
explosion(player.x,player.y)

if(player.health<=0){
state="menu"
level=1
player.health=player.maxHealth
}

}

}

/ HIT ENEMY /

if(b.color==="blue"){

if(b.x>enemy.x && b.x<enemy.x+enemy.w &&
b.y>enemy.y && b.y<enemy.y+enemy.h){

enemy.health--
explosion(enemy.x,enemy.y)

if(enemy.health<=0){

level++

enemy.x=1500+Math.random()1500
enemy.health=2+Math.floor(level/3)

}

}

}

}

bullets=bullets.filter(b=>b.x>0 && b.x<worldWidth)

/ PARTICLES /

for(let p of particles){

p.x+=p.vx
p.y+=p.vy
p.life--

}

particles=particles.filter(p=>p.life>0)

}

/ DRAW PERSON /

function drawPerson(x,y,color){

ctx.strokeStyle=color
ctx.lineWidth=3

ctx.beginPath()
ctx.arc(x+10,y+8,6,0,Math.PI2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x+10,y+14)
ctx.lineTo(x+10,y+28)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x,y+20)
ctx.lineTo(x+20,y+20)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x+10,y+28)
ctx.lineTo(x,y+40)

ctx.moveTo(x+10,y+28)
ctx.lineTo(x+20,y+40)

ctx.stroke()

}

/ DRAW /

function draw(){

/ SKY /

let sky=ctx.createLinearGradient(0,0,0,500)
sky.addColorStop(0,"#87CEEB")
sky.addColorStop(1,"#cfefff")

ctx.fillStyle=sky
ctx.fillRect(0,0,900,500)

/ CLOUDS /

ctx.fillStyle="white"

for(let c of clouds){

ctx.beginPath()
ctx.arc(c.x-cameraX,c.y,c.size,0,Math.PI2)
ctx.fill()

}

/ MENU /

if(state==="menu"){

ctx.fillStyle="black"
ctx.font="60px Arial"
ctx.fillText("SKY BATTLE",300,200)

ctx.font="28px Arial"
ctx.fillText("Tap shoot to start",360,260)

return

}

/ PLATFORMS /

for(let b of blocks){

ctx.fillStyle="#7a5230"
ctx.fillRect(b.x-cameraX,b.y,b.w,b.h)

}

/ CHARACTERS /

drawPerson(player.x-cameraX,player.y,"blue")
drawPerson(enemy.x-cameraX,enemy.y,"red")

/ BULLETS /

for(let b of bullets){

ctx.fillStyle=b.color
ctx.fillRect(b.x-cameraX,b.y,6,3)

}

/ PARTICLES /

for(let p of particles){

ctx.fillStyle="orange"
ctx.fillRect(p.x-cameraX,p.y,4,4)

}

/ UI /

ctx.fillStyle="black"
ctx.font="30px Arial"
ctx.fillText("Level "+level,20,40)

/ HEALTH /

let hp=player.health/player.maxHealth

ctx.fillStyle="black"
ctx.fillRect(20,60,200,20)

ctx.fillStyle=hp>0.4?"green":"red"
ctx.fillRect(20,60,200hp,20)

ctx.strokeStyle="white"
ctx.strokeRect(20,60,200,20)

}

/ LOOP /

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

/ START GAME */

document.getElementById("shoot").addEventListener("pointerdown",()=>{

if(state==="menu"){
state="playing"
}

})

</script>

</body>
</html>
