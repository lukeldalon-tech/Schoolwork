<!DOCTYPE html>
<html>
<head>
<title>Sky Platform Shooter</title>

<style>
body{
margin:0;
overflow:hidden;
background:skyblue;
font-family:Arial;
}

canvas{
display:block;
margin:auto;
background:#87CEEB;
}

.controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

button{
width:70px;
height:70px;
font-size:22px;
border-radius:12px;
border:none;
background:#222;
color:white;
}

button:active{
background:#555;
}
</style>
</head>

<body>

<canvas id="game" width="800" height="500"></canvas>

<div class="controls">
<button id="left">◀</button>
<button id="right">▶</button>
<button id="jump">▲</button>
<button id="shoot">●</button>
</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

/* WORLD */

const worldWidth = 3000
let cameraX = 0

/* LEVEL */

let level = 1
let countdown = 5
let playing = false

/* PLAYER */

let player = {x:200,y:350,w:20,h:40,vy:0}

/* ENEMY */

let enemy = {x:900,y:200,w:20,h:40,vy:0,health:1}

/* BULLETS */

let bullets=[]

/* PARTICLES */

let particles=[]

/* CONTROLS */

let controls={left:false,right:false,jump:false}

function hold(id,key){
let b=document.getElementById(id)

b.ontouchstart=()=>controls[key]=true
b.ontouchend=()=>controls[key]=false
b.onmousedown=()=>controls[key]=true
b.onmouseup=()=>controls[key]=false
}

hold("left","left")
hold("right","right")
hold("jump","jump")

document.getElementById("shoot").onclick=()=>{
if(playing){
shoot(player.x+12,player.y+15,1,"blue")
}
}

/* SHOOT */

function shoot(x,y,dir,color){
bullets.push({x,y,vx:dir*8,color})
}

/* EXPLOSION */

function explosion(x,y){

for(let i=0;i<15;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:30
})

}

}

/* WORLD PLATFORMS */

let blocks=[
{x:0,y:420,w:3000,h:20},
{x:400,y:320,w:140,h:20},
{x:700,y:260,w:140,h:20},
{x:1000,y:200,w:140,h:20},
{x:1400,y:280,w:140,h:20},
{x:1700,y:230,w:140,h:20},
{x:2100,y:300,w:140,h:20},
{x:2500,y:200,w:140,h:20}
]

/* PHYSICS */

function physics(p){

p.vy += 0.5
p.y += p.vy

for(let b of blocks){

if(p.x+p.w>b.x && p.x<b.x+b.w &&
p.y+p.h>b.y && p.y+p.h<b.y+10){

p.y=b.y-p.h
p.vy=0

}

}

if(p.y>450){
p.y=350
p.vy=0
}

}

/* ENEMY AI */

function enemyAI(){

let speed = 1 + level*0.2

if(enemy.x > player.x) enemy.x -= speed
if(enemy.x < player.x) enemy.x += speed

if(Math.random()<0.02) enemy.vy = -9

if(Math.random()<0.02 + level*0.005){
shoot(enemy.x,enemy.y+15,-1,"red")
}

}

/* LEVEL */

function nextLevel(){

level++

player.x = 200
player.y = 350
bullets=[]

if(level==10){

enemy = {x:2000,y:200,w:40,h:80,vy:0,health:10}

}else{

enemy = {x:1500+Math.random()*1000,y:200,w:20,h:40,vy:0,health:1}

}

startCountdown()

}

/* COUNTDOWN */

function startCountdown(){

countdown=5
playing=false

let timer=setInterval(()=>{

countdown--

if(countdown<=0){
playing=true
clearInterval(timer)
}

},1000)

}

startCountdown()

/* UPDATE */

function update(){

if(!playing) return

if(controls.left) player.x-=4
if(controls.right) player.x+=4
if(controls.jump && player.vy===0) player.vy=-11

physics(player)
physics(enemy)

enemyAI()

/* CAMERA */

cameraX = player.x - 400

if(cameraX < 0) cameraX = 0
if(cameraX > worldWidth-800) cameraX = worldWidth-800

/* BULLETS */

for(let b of bullets){

b.x += b.vx

if(b.color==="red"){

if(b.x>player.x && b.x<player.x+player.w &&
b.y>player.y && b.y<player.y+player.h){

explosion(player.x,player.y)
alert("Enemy Wins")
location.reload()

}

}

if(b.color==="blue"){

if(b.x>enemy.x && b.x<enemy.x+enemy.w &&
b.y>enemy.y && b.y<enemy.y+enemy.h){

enemy.health--

explosion(b.x,b.y)

if(enemy.health<=0){

if(level>=10){

explosion(enemy.x,enemy.y)
alert("YOU BEAT THE BOSS!")
location.reload()

}else{

nextLevel()

}

}

}

}

}

bullets = bullets.filter(b=>b.x>0 && b.x<worldWidth)

/* PARTICLES */

for(let p of particles){

p.x += p.vx
p.y += p.vy
p.life--

}

particles = particles.filter(p=>p.life>0)

}

/* DRAW PERSON */

function drawPerson(x,y,color,size=1){

ctx.strokeStyle=color
ctx.lineWidth=3

ctx.beginPath()
ctx.arc(x+10*size,y+8*size,6*size,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x+10*size,y+14*size)
ctx.lineTo(x+10*size,y+28*size)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x,y+20*size)
ctx.lineTo(x+20*size,y+20*size)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x+10*size,y+28*size)
ctx.lineTo(x,y+40*size)
ctx.moveTo(x+10*size,y+28*size)
ctx.lineTo(x+20*size,y+40*size)
ctx.stroke()

}

/* DRAW */

function draw(){

ctx.clearRect(0,0,800,500)

/* PLATFORMS */

for(let b of blocks){

ctx.fillStyle="#7a5230"
ctx.fillRect(b.x-cameraX,b.y,b.w,b.h)

}

/* PLAYER */

drawPerson(player.x-cameraX,player.y,"blue")

/* ENEMY */

if(level==10){
drawPerson(enemy.x-cameraX,enemy.y,"darkred",2)
}else{
drawPerson(enemy.x-cameraX,enemy.y,"red")
}

/* BULLETS */

for(let b of bullets){

ctx.fillStyle=b.color
ctx.fillRect(b.x-cameraX,b.y,6,3)

}

/* PARTICLES */

for(let p of particles){

ctx.fillStyle="orange"
ctx.fillRect(p.x-cameraX,p.y,4,4)

}

/* UI */

ctx.fillStyle="black"
ctx.font="20px Arial"

ctx.fillText("Level: "+level,20,30)

if(level==10){
ctx.fillText("BOSS HP: "+enemy.health,650,30)
}

if(!playing){
ctx.font="40px Arial"
ctx.fillText(countdown,380,250)
}

}

/* LOOP */

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>
